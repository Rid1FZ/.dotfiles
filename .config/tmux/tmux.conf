# unbind all keybindings
unbind-key -a

# options
set-option -g default-terminal 'tmux-256color'
set-option -as terminal-overrides ",xterm-kitty:RGB"
set-option -s escape-time 0
set-option -g history-limit 50000
set-option -g focus-events on
set-option -g status-interval 1
set-option -g repeat-time 500
set-option -g base-index 1
set-option -g pane-base-index 1
set-option -g renumber-windows on
set-option -g default-shell '/usr/bin/zsh'
set-option -g destroy-unattached on
set-window-option -g mode-keys vi
set-window-option -g pane-base-index 1

# Ctrl+Space as prefix
unbind C-b
set-option -g prefix C-Space
bind C-Space send-prefix

# theme and statusbar
set-option -g status-position "bottom"
set-option -g status-style bg=#11111b,fg=#6c7086
set-option -g status-justify "left"
set-option -g status-left ""
set-option -g status-right ""
set-option -g window-status-format " #I:#W "
set-option -g window-status-current-format "#[fg=#f9e2af] #I:#W "
set-option -g message-style fg=#f38ba8
set-option -g display-time 500

# keybindings
bind-key -r h select-pane -L
bind-key -r j select-pane -D 
bind-key -r k select-pane -U
bind-key -r l select-pane -R

bind-key -r H previous-window
bind-key -r L next-window
bind-key space last-window

bind-key v copy-mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi i send-keys -X cancel
bind-key -T copy-mode-vi a send-keys -X cancel

bind-key 'c' new-window -a
bind-key '_' split-window -v
bind-key '|' split-window -h

# plugins
run '~/.config/tmux/tmux-yank/yank.tmux'
run '~/.config/tmux/tmux-navigator/navigator.tmux'
